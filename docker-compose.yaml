version: "3.8"

services:
  mongodb:
    container_name: mongo-service
    image: mongo:latest
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - wanderlust-network

  redis:
    container_name: redis-service
    image: redis:7.0.5-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - wanderlust-network

  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    ports:
      - "31100:8080"
    depends_on:
      - mongodb
      - redis
    networks:
      - wanderlust-network

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./frontend/.env.docker
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - wanderlust-network

volumes:
  mongo-data:

networks:
  wanderlust-network:
    driver: bridge
