kind: Deployment
apiVersion: apps/v1
metadata:
  name: frontend-deployment
  namespace: frontend
  labels:
    app: frontend
spec:
  replicas: 2

  selector:
   matchLabels:
    app: frontend

  template:      
    metadata:
      labels:
        app: frontend
    spec:
      containers:
       - name: frontend
         image: shubham12gupta/frontend:latest

         ports:
          - containerPort: 5173     
