kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: wanderlust

networking:
  apiServerAddress: "0.0.0.0"
  apiServerPort: 6443
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"

nodes:
  - role: control-plane
    image: kindest/node:v1.36.1
    extraPortMappings:
      - containerPort: 30080
        hostPort: 80
        protocol: TCP

      - containerPort: 30443
        hostPort: 443
        protocol: TCP

      - containerPort: 30387
        hostPort: 30387

      - containerPort: 31412
        hostPort: 31412    

      - containerPort: 30081
        hostPort: 8080
        protocol: TCP

  - role: worker
    image: kindest/node:v1.36.1

  - role: worker
    image: kindest/node:v1.36.1
