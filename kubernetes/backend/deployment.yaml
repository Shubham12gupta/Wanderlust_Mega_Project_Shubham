kind: Deployment
apiVersion: apps/v1
metadata:
  name: backend-deployment
  namespace: backend
  labels:
    app: backend
spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend
     
  template:
    metadata:
      labels:
        app: backend

    spec:      
      containers:
        - name: backend
          image: shubham12gupta/backend:latest
          ports:
            - containerPort: 8080     
      
